task: cd
num_classes: 5
ignore_index: 255
seed: 42
model:
  name: sam2fpn
  kwargs:
    config_file: src/models/sam2/configs/sam2.1_hiera_b+.yaml
    checkpoint: pretrained_weight/sam2.1_hiera_base_plus.pt
    in_channels: 6
    num_classes: 5
    decoder_type: upernet
    decoder_channels: 256
dataset:
  name: xbd
  train:
    dataset_path: data/infra_damage/xBD/train
    data_list_path: data/infra_damage/xBD/train_set.txt
    crop_size: 512
    split: train
  val:
    dataset_path: data/infra_damage/xBD/test
    data_list_path: data/infra_damage/xBD/val_set.txt
    crop_size: null
    split: val
  test:
    dataset_path: data/infra_damage/xBD/hold
    data_list_path: data/infra_damage/xBD/test_set.txt
    crop_size: null
    split: test
augmentation:
  train:
    SmartCrop:
      crop_size: 512
      cat_max_ratio: 0.75
      max_retry: 50
      ignore_index: 255
    HorizontalFlip:
      p: 0.5
    VerticalFlip:
      p: 0.5
    RandomRotate90:
      p: 1.0
    Normalize:
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
  val:
    Normalize:
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
optimizer:
  name: AdamW
  learning_rate: 0.0001
  weight_decay: 0.01
  enc_lr_weight: 0.05
scheduler:
  name: null
loss:
  use_lovasz: true
  lovasz_weight: 0.75
training:
  num_epochs: 150
  train_batch_size: 24
  eval_batch_size: 4
  num_workers: 4
output_dir: ./results/xbd/sam2fpn_hiera_bp
inference:
  sliding_kernel: 512
  sliding_stride: 256
  sliding_batch_size: -1
