task: cd
num_classes: 5
ignore_index: 255
seed: 42
model:
  name: hypersigma
  kwargs:
    in_channels: 3
    spatial_pretrained: pretrained_weight/HSI_spatial_checkpoint-1600.pth
    spectral_pretrained: pretrained_weight/spec-vit-base-ultra-checkpoint-1599.pth
    num_classes: 5
dataset:
  name: xbd
  train:
    dataset_path: data/infra_damage/xBD/train
    data_list_path: data/infra_damage/xBD/train_set.txt
    crop_size: 128
    split: train
  val:
    dataset_path: data/infra_damage/xBD/test
    data_list_path: data/infra_damage/xBD/val_set.txt
    crop_size: null
    split: val
  test:
    dataset_path: data/infra_damage/xBD/hold
    data_list_path: data/infra_damage/xBD/test_set.txt
    crop_size: null
    split: test
augmentation:
  train:
    SmartCrop:
      crop_size: 128
      cat_max_ratio: 0.75
      max_retry: 50
      ignore_index: 255
    HorizontalFlip:
      p: 0.5
    VerticalFlip:
      p: 0.5
    RandomRotate90:
      p: 1.0
    Normalize:
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
  val:
    Normalize:
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
optimizer:
  name: AdamW
  learning_rate: 0.0001
  weight_decay: 0.01
  enc_lr_weight: 0.1
scheduler:
  name: null
loss:
  use_lovasz: true
  lovasz_weight: 0.75
training:
  num_epochs: 150
  train_batch_size: 32
  eval_batch_size: 8
  num_workers: 4
output_dir: ./results/xbd/hypersigma
inference:
  sliding_kernel: 128
  sliding_stride: 64
