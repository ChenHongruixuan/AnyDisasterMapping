task: cd
num_classes: 4
ignore_index: 255
seed: 42
model:
  name: skysense
  kwargs:
    in_channels: 6
    num_classes: 4
    img_size: 512
    decoder_channels: 256
    pool_scales:
    - 1
    - 2
    - 3
    - 6
    pretrained_backbone_path: pretrained_weight/skysense_model_backbone_hr.pth
    freeze_backbone: false
dataset:
  name: bright
  train:
    dataset_path: data/infra_damage/bright
    data_list_path: data/infra_damage/bright/train_set.txt
    crop_size: 512
    split: train
  val:
    dataset_path: data/infra_damage/bright
    data_list_path: data/infra_damage/bright/val_set.txt
    crop_size: null
    split: val
  test:
    dataset_path: data/infra_damage/bright
    data_list_path: data/infra_damage/bright/test_set.txt
    crop_size: null
    split: test
augmentation:
  train:
    SmartCrop:
      crop_size: 512
      cat_max_ratio: 0.75
      max_retry: 50
      ignore_index: 255
    HorizontalFlip:
      p: 0.5
    VerticalFlip:
      p: 0.5
    RandomRotate90:
      p: 1.0
    Normalize:
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
  val:
    Normalize:
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
optimizer:
  name: AdamW
  learning_rate: 0.00012
  weight_decay: 0.01
  enc_lr_weight: 0.5
scheduler:
  name: null
loss:
  use_lovasz: true
  lovasz_weight: 0.75
training:
  num_epochs: 450
  train_batch_size: 4
  eval_batch_size: 8
  num_workers: 16
output_dir: ./results/bright/skysense
inference:
  sliding_kernel: 512
  sliding_stride: 256
