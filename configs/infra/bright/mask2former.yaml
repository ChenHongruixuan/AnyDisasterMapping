task: cd
num_classes: 4
ignore_index: 255
seed: 42
model_has_builtin_loss: true
model:
  name: mask2former
  kwargs:
    in_channels: 6
    num_classes: 4
    backbone: facebook/mask2former-swin-base-ade-semantic
dataset:
  name: bright
  train:
    dataset_path: data/infra_damage/bright
    data_list_path: data/infra_damage/bright/train_set.txt
    crop_size: 512
    split: train
  val:
    dataset_path: data/infra_damage/bright
    data_list_path: data/infra_damage/bright/val_set.txt
    crop_size: null
    split: val
  test:
    dataset_path: data/infra_damage/bright
    data_list_path: data/infra_damage/bright/test_set.txt
    crop_size: null
    split: test
augmentation:
  train:
    SmartCrop:
      crop_size: 512
      cat_max_ratio: 0.75
      max_retry: 50
      ignore_index: 255
    HorizontalFlip:
      p: 0.5
    VerticalFlip:
      p: 0.5
    RandomRotate90:
      p: 1.0
    Normalize:
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
  val:
    Normalize:
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
optimizer:
  name: AdamW
  learning_rate: 5.0e-05
  weight_decay: 0.01
  enc_lr_weight: 1.0
scheduler:
  name: null
# loss: Mask2Former 使用内置 Dice+CE loss (model_has_builtin_loss: true)，此块无效
training:
  num_epochs: 450
  train_batch_size: 8
  eval_batch_size: 4
  num_workers: 16
output_dir: ./results/bright/mask2former
inference:
  sliding_kernel: 512
  sliding_stride: 256
  sliding_batch_size: -1
