optimizer:
  name: AdamW
  learning_rate: 0.0001
  enc_lr_weight: 0.1
scheduler:
  name: WarmUpPolyLR
  kwargs:
    lr_power: 0.9
  step_mode: iteration
loss:
  use_dice: true
  dice_weight: 1.0
training:
  num_epochs: 100
  train_batch_size: 8
  eval_batch_size: 1
  num_workers: 16
  metric_for_best_model: IoU_1
output_dir: ./results/wildfire/s2wcd_sen2_norm/cd_dinov3_dpt_vitl_lvd
inference:
  sliding_kernel: 512
  sliding_stride: 256
