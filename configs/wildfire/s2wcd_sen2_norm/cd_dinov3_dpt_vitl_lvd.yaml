task: cd
num_classes: 2
ignore_index: 255
seed: 42
model:
  name: dinov3dpt
  kwargs:
    backbone: dinov3_vitl16
    decoder_channels: 256
    head_channels: 256
    hook_indices:
    - 5
    - 11
    - 17
    - 23
    torchhub_repo: src/models/dinov3
    torchhub_weights: pretrained_weight/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth
    in_channels: 26
    num_classes: 2
dataset:
  name: s2_wcd
  train:
    dataset_path: data/wildfire/s2_wcd
    data_list_path: data/wildfire/s2_wcd/train.txt
    data_type: sen2
    split: train
  val:
    dataset_path: data/wildfire/s2_wcd
    data_list_path: data/wildfire/s2_wcd/val.txt
    data_type: sen2
    split: val
  test:
    dataset_path: data/wildfire/s2_wcd
    data_list_path: data/wildfire/s2_wcd/test.txt
    data_type: sen2
    split: test
augmentation:
  train:
    PadIfNeeded:
      min_height: 512
      min_width: 512
      border_mode: 0
      value: 0
      p: 1.0
    RandomCrop:
      height: 512
      width: 512
    HorizontalFlip:
      p: 0.5
    VerticalFlip:
      p: 0.5
    RandomRotate90:
      p: 1.0
    Normalize: &id001
