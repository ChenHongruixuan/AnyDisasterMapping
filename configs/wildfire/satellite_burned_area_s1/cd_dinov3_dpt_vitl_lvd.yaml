task: cd
num_classes: 5
ignore_index: 255
seed: 42
model:
  name: dinov3dpt
  kwargs:
    backbone: dinov3_vitl16
    decoder_channels: 256
    head_channels: 256
    hook_indices:
    - 5
    - 11
    - 17
    - 23
    torchhub_repo: src/models/dinov3
    torchhub_weights: pretrained_weight/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth
    in_channels: 4
    num_classes: 5
dataset:
  name: satellite_burned_area
  train:
    dataset_path: data/wildfire/satellite_burned_area
    data_list_path: data/wildfire/satellite_burned_area/train.txt
    data_type: s1
    split: train
    mask_intervals: &id001
    - - 0
      - 36
    - - 37
      - 100
    - - 101
      - 164
    - - 165
      - 254
    - - 255
      - 255
  val:
    dataset_path: data/wildfire/satellite_burned_area
    data_list_path: data/wildfire/satellite_burned_area/val.txt
    data_type: s1
    split: val
    mask_intervals: *id001
  test:
    dataset_path: data/wildfire/satellite_burned_area
    data_list_path: data/wildfire/satellite_burned_area/test.txt
    data_type: s1
    split: test
    mask_intervals: *id001
augmentation:
  train:
    PadIfNeeded:
      min_height: 512
      min_width: 512
      border_mode: 0
      value: 0
      p: 1.0
    RandomCrop:
      height: 512
      width: 512
    HorizontalFlip:
      p: 0.5
    VerticalFlip:
      p: 0.5
    RandomRotate90:
      p: 1.0
    Normalize:
      mean:
      - 0.1312
      - 0.0647
      - 0.1312
      - 0.0647
      std:
      - 0.238
      - 0.1094
      - 0.238
      - 0.1094
      max_pixel_value: 1.0
      always_apply: true
  val:
    Normalize:
      mean:
      - 0.1312
      - 0.0647
      - 0.1312
      - 0.0647
      std:
      - 0.238
      - 0.1094
      - 0.238
      - 0.1094
      max_pixel_value: 1.0
      always_apply: true
optimizer:
  name: AdamW
  learning_rate: 0.0001
  enc_lr_weight: 0.1
scheduler:
  name: WarmUpPolyLR
  kwargs:
    lr_power: 0.9
  step_mode: iteration
loss:
  use_dice: true
  dice_weight: 1.0
training:
  num_epochs: 100
  train_batch_size: 8
  eval_batch_size: 1
  num_workers: 16
  metric_for_best_model: mIoU
output_dir: ./results/wildfire/satellite_burned_area_s1/cd_dinov3_dpt_vitl_lvd
inference:
  sliding_kernel: 512
  sliding_stride: 256
