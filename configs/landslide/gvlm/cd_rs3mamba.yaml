task: cd
num_classes: 2
ignore_index: 255
seed: 42
model:
  name: rs3mamba
  kwargs:
    decode_channels: 64
    dropout: 0.1
    backbone_name: swsl_resnet18
    pretrained: true
    window_size: 8
    num_classes: 2
    in_channels: 6
dataset:
  name: gvlm
  train:
    dataset_path: data/landslides/GVLM_CD
    data_list_path: data/landslides/GVLM_CD/train.txt
    crop_size: 512
    split: train
  val:
    dataset_path: data/landslides/GVLM_CD
    data_list_path: data/landslides/GVLM_CD/val.txt
    crop_size: null
    split: val
  test:
    dataset_path: data/landslides/GVLM_CD
    data_list_path: data/landslides/GVLM_CD/test.txt
    crop_size: null
    split: test
augmentation:
  train:
    Normalize: &id001
      mean:
      - 123.675
      - 116.28
      - 103.53
      std:
      - 58.395
      - 57.12
      - 57.375
      max_pixel_value: 1.0
      always_apply: true
  val:
    Normalize: *id001
optimizer:
  name: AdamW
  learning_rate: 5.0e-05
  weight_decay: 0.0001
scheduler:
  name: StepLR
  step_size: 2000
  gamma: 0.8
training:
  num_epochs: 100
  train_batch_size: 32
  eval_batch_size: 32
  num_workers: 16
  eval_interval: 300
output_dir: ./results/gvlm/cd_rs3mamba
