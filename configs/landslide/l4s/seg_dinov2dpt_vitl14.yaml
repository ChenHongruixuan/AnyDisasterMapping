task: seg
num_classes: 2
ignore_index: 255
seed: 42
model:
  name: dinov2dpt
  kwargs:
    in_channels: 14
    num_classes: 2
    backbone: vit_large_patch14_dinov2.lvd142m
    decoder_channels: 256
    head_channels: 256
    hook_indices:
    - 5
    - 11
    - 17
    - 23
    pretrained_backbone: true
dataset:
  name: l4s
  train:
    dataset_path: data/landslides/Landslide4Sense
    data_list_path: data/landslides/Landslide4Sense/train.txt
    crop_size: null
    split: train
  val:
    dataset_path: data/landslides/Landslide4Sense
    data_list_path: data/landslides/Landslide4Sense/val.txt
    crop_size: null
    split: val
  test:
    dataset_path: data/landslides/Landslide4Sense
    data_list_path: data/landslides/Landslide4Sense/test.txt
    crop_size: null
    split: test
augmentation:
  train:
    Resize:
      height: 126
      width: 126
  val:
    Resize:
      height: 126
      width: 126
optimizer:
  name: AdamW
  learning_rate: 0.001
  weight_decay: 0.0001
scheduler:
  name: StepLR
  step_size: 2000
  gamma: 0.8
training:
  num_epochs: 150
  train_batch_size: 32
  eval_batch_size: 32
  num_workers: 16
  eval_interval: 300
output_dir: ./results/l4s/seg_dinov2dpt_vitl14
