task: seg
num_classes: 2
ignore_index: 255
seed: 42
model:
  name: clipdpt
  kwargs:
    in_channels: 4
    num_classes: 2
    clip_model: openai/clip-vit-large-patch14
    decoder_channels: 256
    head_channels: 256
    hook_indices:
    - 5
    - 11
    - 17
    - 23
    num_features: 4
dataset:
  name: hrgldd
  train:
    data_npy_path: data/landslides/HR_GLDD/trainX.npy
    label_npy_path: data/landslides/HR_GLDD/trainY.npy
    split: train
  val:
    data_npy_path: data/landslides/HR_GLDD/valX.npy
    label_npy_path: data/landslides/HR_GLDD/valY.npy
    split: val
  test:
    data_npy_path: data/landslides/HR_GLDD/testX.npy
    label_npy_path: data/landslides/HR_GLDD/testY.npy
    split: test
augmentation:
  train:
    Resize:
      height: 126
      width: 126
  val:
    Resize:
      height: 126
      width: 126
optimizer:
  name: AdamW
  learning_rate: 0.0005
  weight_decay: 0.0001
scheduler:
  name: StepLR
  step_size: 2000
  gamma: 0.8
training:
  num_epochs: 300
  train_batch_size: 32
  eval_batch_size: 32
  num_workers: 16
  eval_interval: 300
output_dir: ./results/hrgldd/seg_clipdpt_large
