task: seg
num_classes: 2
ignore_index: 255
seed: 42
model:
  name: dinov2dpt
  kwargs:
    in_channels: 4
    num_classes: 2
    backbone: vit_base_patch14_dinov2.lvd142m
    decoder_channels: 256
    head_channels: 256
    hook_indices:
    - 2
    - 5
    - 8
    - 11
    pretrained_backbone: true
dataset:
  name: hrgldd
  train:
    data_npy_path: data/landslides/HR_GLDD/trainX.npy
    label_npy_path: data/landslides/HR_GLDD/trainY.npy
    split: train
  val:
    data_npy_path: data/landslides/HR_GLDD/valX.npy
    label_npy_path: data/landslides/HR_GLDD/valY.npy
    split: val
  test:
    data_npy_path: data/landslides/HR_GLDD/testX.npy
    label_npy_path: data/landslides/HR_GLDD/testY.npy
    split: test
augmentation:
  train:
    Resize:
      height: 126
      width: 126
  val:
    Resize:
      height: 126
      width: 126
optimizer:
  name: AdamW
  learning_rate: 0.001
  weight_decay: 0.01
scheduler:
  name: StepLR
  step_size: 500
  gamma: 0.8
training:
  num_epochs: 300
  train_batch_size: 32
  eval_batch_size: 32
  num_workers: 16
  eval_interval: 300
output_dir: ./results/hrgldd/seg_dinov2dpt_vitb14
