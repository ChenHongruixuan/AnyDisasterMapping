task: seg
num_classes: 2
ignore_index: 255
seed: 42
model:
  name: satmae
  kwargs:
    in_channels: 4
    num_classes: 2
    backbone: satmae-vit-base-patch16
    checkpoint_path: pretrained_weight/pretrain-vit-base-e199.pth
    decoder_channels: 256
    head_channels: 256
dataset:
  name: hrgldd
  train:
    data_npy_path: data/landslides/HR_GLDD/trainX.npy
    label_npy_path: data/landslides/HR_GLDD/trainY.npy
    split: train
  val:
    data_npy_path: data/landslides/HR_GLDD/valX.npy
    label_npy_path: data/landslides/HR_GLDD/valY.npy
    split: val
  test:
    data_npy_path: data/landslides/HR_GLDD/testX.npy
    label_npy_path: data/landslides/HR_GLDD/testY.npy
    split: test
augmentation:
  train: {}
  val: {}
optimizer:
  name: AdamW
  learning_rate: 0.0001
  weight_decay: 0.0001
scheduler:
  name: StepLR
  step_size: 500
  gamma: 0.8
training:
  num_epochs: 300
  train_batch_size: 16
  eval_batch_size: 16
  num_workers: 16
  eval_interval: 300
output_dir: ./results/hrgldd/seg_satmae
