task: cd
num_classes: 3
ignore_index: 255
seed: 42
model:
  name: changemamba
  kwargs:
    output_building: 2
    output_damage: 3
    pretrained: pretrained_weight/vssm_tiny_0230_ckpt_epoch_262.pth
    norm_layer: ln2d
    ssm_act_layer: silu
    mlp_act_layer: gelu
    in_chans: 4
    siamese_mode: pseudo
dataset:
  name: kurosiwo
  train:
    dataset_path: data/flood/kurosiwo
    data_list_path: data/flood/kurosiwo/train.txt
    split: train
  val:
    dataset_path: data/flood/kurosiwo
    data_list_path: data/flood/kurosiwo/validation.txt
    split: val
  test:
    dataset_path: data/flood/kurosiwo
    data_list_path: data/flood/kurosiwo/test.txt
    split: test
augmentation:
  train:
    HorizontalFlip:
      p: 0.5
    VerticalFlip:
      p: 0.5
    RandomRotate90:
      p: 1.0
    RandomCrop:
      height: 224
      width: 224
  val:
    CenterCrop:
      height: 224
      width: 224
optimizer:
  name: AdamW
  learning_rate: 0.0001
  weight_decay: 0.005
scheduler:
  name: CosineAnnealingLR
  step_mode: epoch
  kwargs:
    T_max: 100
loss:
  use_lovasz: false
  lovasz_weight: 0.75
training:
  num_epochs: 100
  train_batch_size: 16
  eval_batch_size: 1
  num_workers: 4
  metric_for_best_model: mIoU
output_dir: ./results/flood/kurosiwo/cd_changemamba
